<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة تسجيل دخول</title>
</head>
<body>

    <div style="text-align: center; margin-bottom: 20px;">
        <img src="images.jpg" alt="mohaned" width="300" height="200">
    </div>

    <div style="max-width: 450px; margin: 0 auto;">
        
        <h2 style="text-align: center; font-family: 'Times New Roman', Times, serif; margin-bottom: 15px;">Login Page</h2>
        
        <fieldset style="border: 1px solid #777; padding: 20px 30px;">
            <form action="#" method="POST">
                <table width="100%" cellpadding="8">
                    <tr>
                        <td align="right" width="40%">
                            <label for="name"><b><i>Name</i></b></label>
                        </td>
                        <td>
                            <input type="text" id="name" placeholder="Mohaned Negel">
                        </td>
                    </tr>
                    
                    <tr>
                        <td align="right">
                            <label for="phone"><b><i>Phone Number</i></b></label>
                        </td>
                        <td>
                            <input type="text" id="phone" placeholder="+2010183XXXXX">
                        </td>
                    </tr>
                    
                    <tr>
                        <td align="right">
                            <label for="email"><b><i>Email Address</i></b></label>
                        </td>
                        <td>
                            <input type="email" id="email" placeholder="mohanednegel2@gmail.com">
                        </td>
                    </tr>
                    
                    <tr>
                        <td align="right">
                            <label for="age"><b><i>Your Age</i></b></label>
                        </td>
                        <td>
                            <input type="number" id="age" placeholder="19">
                        </td>
                    </tr>
                    
                    <tr>
                        <td colspan="2" align="center" style="padding-top: 20px;">
                            <input type="submit" value="login" style="padding: 5px 15px; cursor: pointer;">
                        </td>
                    </tr>
                </table>
            </form>
        </fieldset>

    </div>

    <div style="text-align: center; margin-top: 25px;">
        <audio controls>
            <source src="(MP3_160K)_1.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

</body>
</html>
